<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Performance Predictor</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            background-color: #f4f7f6;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .login-container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 550px;
        }
        .form-title {
            color: #2c3e50;
            font-weight: 600;
            font-size: 1.8rem;
            text-align: center;
            margin-bottom: 25px;
        }
        .prediction-result {
            margin-top: 25px;
            padding: 15px;
            background-color: #e8f4fd;
            border-left: 5px solid #0d6efd;
            border-radius: 5px;
            text-align: center;
            color: #0d6efd;
        }
        .btn-submit {
            width: 100%;
            padding: 10px;
            font-size: 1.1rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h1 class="form-title">Student Exam Performance Predictor</h1>

        <form action="{{ url_for('predict_datapoints') }}" method="post">
            
            <div class="mb-3">
                <label class="form-label fw-bold">Gender</label>
                <select class="form-select" name="gender" required>
                    <option class="placeholder" selected disabled value="">Select your Gender</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                </select>
            </div>
            
            <div class="mb-3">
                <label class="form-label fw-bold">Race or Ethnicity</label>
                <select class="form-select" name="ethnicity" required>
                    <option class="placeholder" selected disabled value="">Select Ethnicity</option>
                    <option value="group A">Group A</option>
                    <option value="group B">Group B</option>
                    <option value="group C">Group C</option>
                    <option value="group D">Group D</option>
                    <option value="group E">Group E</option>
                </select>
            </div>
            
            <div class="mb-3">
                <label class="form-label fw-bold">Parental Level of Education</label>
                <select class="form-select" name="parental_level_of_education" required>
                    <option class="placeholder" selected disabled value="">Select Parent Education</option>
                    <option value="associate's degree">Associate's Degree</option>
                    <option value="bachelor's degree">Bachelor's Degree</option>
                    <option value="high school">High School</option>
                    <option value="master's degree">Master's Degree</option>
                    <option value="some college">Some College</option>
                    <option value="some high school">Some High School</option>
                </select>
            </div>
            
            <div class="mb-3">
                <label class="form-label fw-bold">Lunch Type</label>
                <select class="form-select" name="lunch" required>
                    <option class="placeholder" selected disabled value="">Select Lunch Type</option>
                    <option value="free/reduced">Free/Reduced</option>
                    <option value="standard">Standard</option>
                </select>
            </div>
            
            <div class="mb-3">
                <label class="form-label fw-bold">Test Preparation Course</label>
                <select class="form-select" name="test_preparation_course" required>
                    <option class="placeholder" selected disabled value="">Select Course Status</option>
                    <option value="none">None</option>
                    <option value="completed">Completed</option>
                </select>
            </div>
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">Reading Score</label>
                    <input class="form-control" type="number" name="reading_score" placeholder="0 - 100" min="0" max="100" required />
                </div>
                
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">Writing Score</label>
                    <input class="form-control" type="number" name="writing_score" placeholder="0 - 100" min="0" max="100" required />
                </div>
            </div>
            
            <div class="mt-4">
                <input class="btn btn-primary btn-submit" type="submit" value="Predict Maths Score" />
            </div>
        </form>
        
        {% if result %}
        <div class="prediction-result">
            <h3 class="mb-0">Predicted Score: <strong>{{result}}</strong></h3>
        </div>
        {% endif %}

    </div>

</body>
</html>
